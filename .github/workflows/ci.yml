name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Formatage (Prettier)
        run: npx prettier --check "src/**/*.{ts,html,css,json}"

      - name: Tests unitaires
        run: npx ng test
        env:
          CI: 'true'

      - name: Build de production
        run: npx ng build
