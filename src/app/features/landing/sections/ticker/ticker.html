@if (quotes().length) {
  <section class="ticker" aria-label="Cours des cryptomonnaies en temps réel">
    <div class="ticker-track">
      @for (copy of [0, 1]; track copy) {
        <ul class="ticker-list" [attr.aria-hidden]="copy === 1 ? true : null">
          @for (quote of quotes(); track quote.id) {
            <li>
              <span class="ticker-symbol">{{ quote.symbol }} / USD</span>
              <span class="ticker-price">{{ formatPrice(quote.price) }}</span>
              <span class="ticker-change" [class.is-down]="!quote.up">
                {{ formatChange(quote.changePercent) }}
              </span>
            </li>
          }
        </ul>
      }
    </div>
  </section>
}
