<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Connexion</h1>
    <p class="auth-sub">Accède à ton espace personnel TradingCorp.</p>

    @if (erreur(); as message) {
      <p class="form-erreur" role="alert">{{ message }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="soumettre()" novalidate>
      <div class="champ">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="toi@exemple.com"
        />
        @if (invalide('email')) {
          <p class="champ-erreur">Adresse e-mail invalide.</p>
        }
      </div>

      <div class="champ">
        <label for="mdp">Mot de passe</label>
        <input
          id="mdp"
          type="password"
          formControlName="mdp"
          autocomplete="current-password"
          placeholder="••••••••"
        />
        @if (invalide('mdp')) {
          <p class="champ-erreur">Mot de passe requis.</p>
        }
      </div>

      <button class="btn btn-primary auth-submit" type="submit" [disabled]="chargement()">
        {{ chargement() ? 'Connexion…' : 'Se connecter' }}
      </button>
    </form>

    <div class="auth-sep">ou</div>

    <button class="btn-google" type="button" (click)="avecGoogle()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="#EA4335"
          d="M12 5.04c1.62 0 3.06.56 4.2 1.64l3.12-3.12C17.45 1.79 14.97.75 12 .75 7.7.75 3.99 3.22 2.18 6.82l3.66 2.84C6.71 7.03 9.14 5.04 12 5.04Z"
        />
        <path
          fill="#4285F4"
          d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58l3.54 2.75c2.07-1.92 3.88-4.74 3.88-8.57Z"
        />
        <path
          fill="#FBBC05"
          d="M5.84 14.34a7.2 7.2 0 0 1 0-4.68L2.18 6.82a11.26 11.26 0 0 0 0 10.36l3.66-2.84Z"
        />
        <path
          fill="#34A853"
          d="M12 23.25c3.04 0 5.6-1 7.46-2.72l-3.54-2.75c-.98.66-2.25 1.06-3.92 1.06-2.86 0-5.29-1.99-6.16-4.66l-3.66 2.84c1.81 3.6 5.52 6.23 9.82 6.23Z"
        />
      </svg>
      Continuer avec Google
    </button>

    <p class="auth-alt">Pas encore de compte ? <a routerLink="/inscription">Créer un compte</a></p>
  </div>
</div>
